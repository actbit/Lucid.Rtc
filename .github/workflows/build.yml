name: Build and Package

on:
  push:
    branches: [master, main]
    tags:
      - 'v*'
  pull_request:
    branches: [master, main]
  workflow_dispatch:
    inputs:
      build_pion:
        description: 'Build Pion backend'
        required: false
        default: 'false'
        type: boolean

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Build Rust native libraries for each platform
  build-rust:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            rid: win-x64
            ext: dll
          - target: i686-pc-windows-msvc
            os: windows-latest
            rid: win-x86
            ext: dll
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            rid: win-arm64
            ext: dll
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            rid: linux-x64
            ext: so
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            rid: linux-arm64
            ext: so
            use-cross: true
          - target: arm-unknown-linux-gnueabihf
            os: ubuntu-latest
            rid: linux-arm
            ext: so
            use-cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            rid: osx-x64
            ext: dylib
          - target: aarch64-apple-darwin
            os: macos-latest
            rid: osx-arm64
            ext: dylib

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use-cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.target }}-
            ${{ runner.os }}-cargo-

      - name: Build Rust library
        run: |
          ${{ matrix.use-cross && 'cross' || 'cargo' }} build --release -p lucid-rtc-sys --target ${{ matrix.target }}

      - name: Prepare artifact
        shell: bash
        run: |
          mkdir -p artifact/${{ matrix.rid }}/native
          if [ "${{ matrix.ext }}" = "dll" ]; then
            cp target/${{ matrix.target }}/release/lucid_rtc.dll artifact/${{ matrix.rid }}/native/
          elif [ "${{ matrix.ext }}" = "so" ]; then
            cp target/${{ matrix.target }}/release/liblucid_rtc.so artifact/${{ matrix.rid }}/native/
          else
            cp target/${{ matrix.target }}/release/liblucid_rtc.dylib artifact/${{ matrix.rid }}/native/
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rust-${{ matrix.rid }}
          path: artifact
          retention-days: 1

  # Build Pion (Go) native libraries
  build-pion:
    if: ${{ github.event.inputs.build_pion == 'true' || startsWith(github.ref, 'refs/tags/v') }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: windows
            goarch: amd64
            os: windows-latest
            rid: win-x64
            ext: dll
          - goos: windows
            goarch: 386
            os: windows-latest
            rid: win-x86
            ext: dll
          - goos: windows
            goarch: arm64
            os: windows-latest
            rid: win-arm64
            ext: dll
          - goos: linux
            goarch: amd64
            os: ubuntu-latest
            rid: linux-x64
            ext: so
          - goos: linux
            goarch: arm64
            os: ubuntu-latest
            rid: linux-arm64
            ext: so
          - goos: linux
            goarch: arm
            os: ubuntu-latest
            rid: linux-arm
            ext: so
          - goos: darwin
            goarch: amd64
            os: macos-latest
            rid: osx-x64
            ext: dylib
          - goos: darwin
            goarch: arm64
            os: macos-latest
            rid: osx-arm64
            ext: dylib

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ matrix.goos }}-${{ matrix.goarch }}-${{ hashFiles('pion/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-${{ matrix.goos }}-${{ matrix.goarch }}-

      - name: Install mingw (Windows x86)
        if: matrix.goos == 'windows' && matrix.goarch == '386'
        run: |
          choco install mingw -y --x86 --force
          echo "C:\Program Files (x86)\mingw32\bin" >> $GITHUB_PATH

      - name: Install cross-compiler (Linux arm64)
        if: matrix.goos == 'linux' && matrix.goarch == 'arm64'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          echo "CC=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "CXX=aarch64-linux-gnu-g++" >> $GITHUB_ENV

      - name: Install cross-compiler (Linux arm)
        if: matrix.goos == 'linux' && matrix.goarch == 'arm'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf
          echo "CC=arm-linux-gnueabihf-gcc" >> $GITHUB_ENV
          echo "CXX=arm-linux-gnueabihf-g++" >> $GITHUB_ENV

      - name: Build Pion library
        id: build-pion
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
        continue-on-error: ${{ matrix.goarch == 'arm64' && matrix.goos == 'windows' }}
        run: |
          cd pion
          go mod tidy
          if [ "${{ matrix.ext }}" = "dll" ]; then
            go build -buildmode=c-shared -o lucid_rtc.dll .
          elif [ "${{ matrix.ext }}" = "so" ]; then
            go build -buildmode=c-shared -o liblucid_rtc.so .
          else
            go build -buildmode=c-shared -o liblucid_rtc.dylib .
          fi

      - name: Prepare artifact
        if: success() || steps.build-pion.outcome == 'success'
        shell: bash
        run: |
          mkdir -p artifact/${{ matrix.rid }}/native
          if [ "${{ matrix.ext }}" = "dll" ]; then
            cp pion/lucid_rtc.dll artifact/${{ matrix.rid }}/native/
            cp pion/lucid_rtc.h artifact/${{ matrix.rid }}/native/ || true
          elif [ "${{ matrix.ext }}" = "so" ]; then
            cp pion/liblucid_rtc.so artifact/${{ matrix.rid }}/native/
            cp pion/liblucid_rtc.h artifact/${{ matrix.rid }}/native/ || true
          else
            cp pion/liblucid_rtc.dylib artifact/${{ matrix.rid }}/native/
            cp pion/liblucid_rtc.h artifact/${{ matrix.rid }}/native/ || true
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pion-${{ matrix.rid }}
          path: artifact
          retention-days: 1

  # Build .NET packages
  build-dotnet:
    needs: [build-rust]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Download Rust artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: rust-*
          path: dotnet/Lucid.Rtc.Rust
          merge-multiple: true

      - name: Download Pion artifacts
        if: ${{ github.event.inputs.build_pion == 'true' || startsWith(github.ref, 'refs/tags/v') }}
        uses: actions/download-artifact@v4
        with:
          pattern: pion-*
          path: dotnet/Lucid.Rtc.Pion
          merge-multiple: true
        continue-on-error: true

      - name: List downloaded files
        run: find dotnet -name "*.dll" -o -name "*.so" -o -name "*.dylib" | head -20

      - name: Build .NET solution
        run: dotnet build Lucid.Rtc.slnx -c Release

      - name: Run tests
        run: dotnet test Lucid.Rtc.slnx -c Release --no-build

      - name: Pack Lucid.Rtc.Core
        run: dotnet pack dotnet/Lucid.Rtc.Core/Lucid.Rtc.Core.csproj -c Release -o artifacts

      - name: Pack Lucid.Rtc.MessagePack
        run: dotnet pack dotnet/Lucid.Rtc.MessagePack/Lucid.Rtc.MessagePack.csproj -c Release -o artifacts

      - name: Pack Rust platform-specific packages
        run: |
          for proj in dotnet/Lucid.Rtc.Rust/Lucid.Rtc.Rust.*.csproj; do
            if [[ "$proj" != *"Rust.All"* ]] && [[ "$proj" != *"Rust.csproj"* ]]; then
              dotnet pack "$proj" -c Release -o artifacts --no-build || true
            fi
          done

      - name: Pack Lucid.Rtc.Rust.All
        run: dotnet pack dotnet/Lucid.Rtc.Rust/Lucid.Rtc.Rust.All.csproj -c Release -o artifacts

      - name: Pack Lucid.Rtc.Rust metapackage
        run: dotnet pack dotnet/Lucid.Rtc.Rust/Lucid.Rtc.Rust.csproj -c Release -o artifacts

      - name: Pack Lucid.Rtc metapackage
        run: dotnet pack dotnet/Lucid.Rtc/Lucid.Rtc.csproj -c Release -o artifacts

      - name: Pack Pion platform-specific packages
        if: ${{ github.event.inputs.build_pion == 'true' || startsWith(github.ref, 'refs/tags/v') }}
        run: |
          for proj in dotnet/Lucid.Rtc.Pion/Lucid.Rtc.Pion.*.csproj; do
            if [[ "$proj" != *"Pion.All"* ]] && [[ "$proj" != *"Pion.csproj"* ]]; then
              dotnet pack "$proj" -c Release -o artifacts --no-build || true
            fi
          done
        continue-on-error: true

      - name: Pack Lucid.Rtc.Pion.All
        if: ${{ github.event.inputs.build_pion == 'true' || startsWith(github.ref, 'refs/tags/v') }}
        run: dotnet pack dotnet/Lucid.Rtc.Pion/Lucid.Rtc.Pion.All.csproj -c Release -o artifacts || true

      - name: Pack Lucid.Rtc.Pion metapackage
        if: ${{ github.event.inputs.build_pion == 'true' || startsWith(github.ref, 'refs/tags/v') }}
        run: dotnet pack dotnet/Lucid.Rtc.Pion/Lucid.Rtc.Pion.csproj -c Release -o artifacts || true

      - name: List packages
        run: ls -la artifacts/

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: artifacts/*.nupkg
          retention-days: 7

  # Publish to NuGet (on tag)
  publish:
    needs: build-dotnet
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          name: nuget-packages
          path: artifacts

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Push to NuGet
        run: |
          for pkg in artifacts/*.nupkg; do
            dotnet nuget push "$pkg" --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/*.nupkg
          generate_release_notes: true
