name: Build and Package

on:
  push:
    branches: [master, main]
    tags:
      - 'v*'
  pull_request:
    branches: [master, main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Build native libraries for each platform
  build-native:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            rid: win-x64
            ext: dll
          - target: i686-pc-windows-msvc
            os: windows-latest
            rid: win-x86
            ext: dll
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            rid: win-arm64
            ext: dll

          # Linux
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            rid: linux-x64
            ext: so
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            rid: linux-arm64
            ext: so
            use-cross: true
          - target: arm-unknown-linux-gnueabihf
            os: ubuntu-latest
            rid: linux-arm
            ext: so
            use-cross: true

          # macOS
          - target: x86_64-apple-darwin
            os: macos-latest
            rid: osx-x64
            ext: dylib
          - target: aarch64-apple-darwin
            os: macos-latest
            rid: osx-arm64
            ext: dylib

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use-cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.target }}-
            ${{ runner.os }}-cargo-

      - name: Build native library
        run: |
          ${{ matrix.use-cross && 'cross' || 'cargo' }} build --release -p lucid-rtc-sys --target ${{ matrix.target }}

      - name: Prepare artifact
        shell: bash
        run: |
          mkdir -p artifact/${{ matrix.rid }}/native
          if [ "${{ matrix.ext }}" = "dll" ]; then
            cp target/${{ matrix.target }}/release/lucid_rtc.dll artifact/${{ matrix.rid }}/native/
          elif [ "${{ matrix.ext }}" = "so" ]; then
            cp target/${{ matrix.target }}/release/liblucid_rtc.so artifact/${{ matrix.rid }}/native/
          else
            cp target/${{ matrix.target }}/release/liblucid_rtc.dylib artifact/${{ matrix.rid }}/native/
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.rid }}
          path: artifact
          retention-days: 1

  # Build .NET packages
  build-dotnet:
    needs: build-native
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Download all native artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: native-*
          path: dotnet/Lucid.Rtc.Native
          merge-multiple: true

      - name: List downloaded files
        run: find dotnet/Lucid.Rtc.Native -type f

      - name: Build .NET solution
        run: dotnet build Lucid.Rtc.slnx -c Release

      - name: Run tests
        run: dotnet test Lucid.Rtc.slnx -c Release --no-build

      - name: Pack Lucid.Rtc.Core
        run: dotnet pack dotnet/Lucid.Rtc.Core/Lucid.Rtc.Core.csproj -c Release -o artifacts

      - name: Pack native packages (individual)
        run: |
          for proj in dotnet/Lucid.Rtc.Native/Lucid.Rtc.Native.*.csproj; do
            if [[ "$proj" != *"Native.All"* ]]; then
              dotnet pack "$proj" -c Release -o artifacts --no-build || true
            fi
          done

      - name: Pack Lucid.Rtc.Native.All
        run: dotnet pack dotnet/Lucid.Rtc.Native.All/Lucid.Rtc.Native.All.csproj -c Release -o artifacts

      - name: Pack Lucid.Rtc metapackage
        run: dotnet pack dotnet/Lucid.Rtc/Lucid.Rtc.csproj -c Release -o artifacts

      - name: List packages
        run: ls -la artifacts/

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: artifacts/*.nupkg
          retention-days: 7

  # Publish to NuGet (on tag)
  publish:
    needs: build-dotnet
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          name: nuget-packages
          path: artifacts

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Push to NuGet
        run: |
          for pkg in artifacts/*.nupkg; do
            dotnet nuget push "$pkg" --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/*.nupkg
          generate_release_notes: true
